<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasbih Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Playfair+Display:wght@400;600;700&family=Poppins:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">

    <style>

body {
    background-image: linear-gradient(135deg, var(--primary-green) 0%, var(--secondary-green) 100%);
    font-family: 'Poppins', sans-serif;
    color: var(--cream);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    margin: 0;
    padding: 0;
}

.wrapper {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 5%;
}

h1 {
    text-align: center;
    color: var(--gold);
    font-family: 'Playfair Display', serif;
    font-size: 54px;
    margin-top: 20px;
    margin-bottom: 10px;
    text-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
}   

h4 {
    text-align: center;
    color: rgba(253, 251, 247, 0.8);
    font-weight: 300;
    margin-bottom: 40px;
}

.target-section {
    text-align: center;
    margin-bottom: 10px;
    font-size: 18px;
}

.target-selector {
    width: 90px;
    height: 40px;
    border-radius: 8px;
    background-color: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 16px;
    text-align: center;
    cursor: pointer;
    outline: none;
}

.target-selector option {
    background-color: var(--secondary-green);
    color: var(--cream);
}

.counter-section {
    text-align: center;
    font-size: 160px;
    font-weight: 700;
    color: var(--cream);
    text-shadow: 0px 0px 30px rgba(212, 175, 55, 0.6); 
    margin: 20px 0 0 0;
    line-height: 1;
}

.notification-area {
    text-align: center;
    font-size: 18px;
    font-weight: 500;
    color: var(--gold);
    min-height: 27px;
    margin-bottom: 5px;
}

.control-section {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 30px;
    margin-top: 0;
    margin-bottom: 50px;
}

.btn-add {
    border-radius: 50%;
    width: 150px;
    height: 150px;
    font-family: 'Poppins', sans-serif;
    font-size: 100px;
    font-weight: 400;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid var(--gold);
    background-color: var(--gold);
    color: var(--primary-green);
    box-shadow: 0px 8px 25px rgba(0, 0, 0, 0.3);
    cursor: pointer;
    transition: all 0.2s ease;
    padding-bottom: 10px;
}

.btn-less {
    border-radius: 50%;
    width: 60px;
    height: 60px;
    font-family: 'Poppins', sans-serif;
    font-size: 45px;
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: transparent;
    border: 2px solid var(--gold);
    color: var(--cream);
    cursor: pointer;
    transition: all 0.2s ease;
    padding-bottom: 5px;
}

.btn-reset {
    height: 45px;
    padding: 0 25px;
    border-radius: 25px;
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 15px;
    background-color: transparent;
    border: 2px solid var(--gold);
    color: var(--cream);
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 1px;
}

.btn-add:hover {
    background-color: var(--gold-hover);
    border-color: var(--gold-hover);
    box-shadow: 0px 10px 30px rgba(212, 175, 55, 0.4);
    transform: translateY(-3px);
}

.btn-less:hover, .btn-reset:hover {
    background-color: rgba(212, 175, 55, 0.1);
    color: var(--gold);
}

.btn-add:active, .btn-less:active, .btn-reset:active {
    transform: scale(0.95);
}

footer {
    background: linear-gradient(135deg, #052224 0%, #0a3d41 100%);
    color: var(--gold);
    text-align: center;
    padding: 30px 5%;
    border-top: 2px solid var(--gold);
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    letter-spacing: 1px;
    margin-top: auto;
}
    </style>
</head>
<body>
    <header >
        <h1>Tasbih Digital</h1>
        <h4>Tekan tombol untuk menghitung.
             Notifikasi akan muncul saat target tercapai.
           </h4>
    </header>

    <main>
        <section>
             <div id="pilihan-target" class="target-section">
                <span class="target-label">Target Dzikir:</span> <br> <br>
                <select class="target-selector">
                    <option value="11">11</option>
                    <option value="33">33</option>
                    <option value="99">99</option>
                    <option value="100">100</option>
                </select>
            </div>

            <br>

            <div class="counter-section">
                <div id="tampilan-Angka" class="count-number">0</div>
            </div>

             <div class="notification-area">
                <p id="pesan-notif" class="notif-message">Alhamdulillah, Target Tercapai! </p>
            </div>

            <br>

            <div class="control-section">
                <button id="tombol-Tambah" class="btn-add" aria-label="Tambah Hitungan">+</button> <br> <br>
                <button id="tombol-Kurang" class="btn-less" aria-label="Kurang Hitungan">-</button>  
                <button id="tombol-Reset" class="btn-reset">Reset</button>
            </div>

        </section>
    </main>
    <footer>
        @ 2026 Portal Ramadhan
    </footer>
    <script>
    document.addEventListener("DOMContentLoaded", function() {
        const tampilanAngka = document.getElementById("tampilan-Angka")
        const tombolTambah = document.getElementById("tombol-Tambah")
        const tombolKurang = document.getElementById("tombol-Kurang")
        const tombolReset = document.getElementById("tombol-Reset")
        const pilihanTarget = document.querySelector(".target-selector");
        const pesanNotif = document.getElementById("pesan-notif");
        const suaraKlik = new Audio('beep-sound.mp3'); 
        const suaraNotif = new Audio('notification.mp3');
       

        let angkaAwal = 0
        pesanNotif.style.display = "none";

        function notifikasi(){
            const target = parseInt(pilihanTarget.value);
            if (angkaAwal >= target) {
                pesanNotif.style.display = "block";
            }
            if (angkaAwal === target) {
            suaraNotif.currentTime = 0;
            suaraNotif.play();
            }
            else{
                pesanNotif.style.display = "none";
            }
        }

        tombolTambah.addEventListener("click", angkaBertambah)
        function angkaBertambah(){
            angkaAwal++;
            tampilanAngka.innerText = angkaAwal;
            suaraKlik.currentTime = 0; 
            suaraKlik.play();
            tampilanAngka.style.color = "white";
            setTimeout(function() {
            tampilanAngka.style.color = "#d4af37";
            }, 100);
            notifikasi()
        }

        tombolKurang.addEventListener("click", angkaBerkurang)
        function angkaBerkurang(){
            if (angkaAwal>0){
            angkaAwal--;
            tampilanAngka.innerText = angkaAwal;
            notifikasi()
            }
        }

        tombolReset.addEventListener("click", angkaKembali)
        function angkaKembali(){
            angkaAwal = 0
            tampilanAngka.innerText = angkaAwal;
            notifikasi()
        }

         pilihanTarget.addEventListener("change", function() {
                notifikasi();
            });

    })

    </script>
    
</body>
</html>
