<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Imsakiyah</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
.pesan-loading, 
.pesan-error, 
.table-container{
    display: none;
}

body{
    background-image: linear-gradient(135deg, #0a3d41 0%, #1a5e61 100%);
    font-family: 'Poppins', sans-serif;
    color: #f0f0f0;
}

header{
    text-align: center;
    margin-bottom: 30px;
    color: #e3c472;;
}

h1{
    margin-bottom: 5px;
}

.tahun{
    font-weight: 200;
    margin-top: 0;
}

.info{
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    font-size: 20px;
    color: #f5e1b5;
}

.dropdown{
    display: flex;
    align-items: center;
    gap: 10px;
}

table{
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
    background-color: rgba(0, 0, 0, 0.1);
    border-radius: 8px;
    overflow: hidden;
}

th, td {
    border: 2px solid #333;
    padding: 14px;
    text-align: center;
}

th {
    background-color: rgba(0, 0, 0, 0.3);
    color: #e3c472;
    text-transform: uppercase;
    font-size: 14px;
    letter-spacing: 1px;
}

td {
    color: #dcdcdc;
}

select {
    padding: 8px 12px;
    font-family: inherit;
    font-size: 16px;
    border-radius: 5px;
    background-color: rgba(255, 255, 255, 0.05);
    color: #ffffff;
    border: 1px solid #e3c472;
    outline: none;
}

select option {
    background-color: #173b3a;
    color: #ffffff;
}

.today-highlight { 
    background-color: rgba(227, 196, 114, 0.2);
}

.today-highlight td {
    color: #ffffff;
    font-weight: 600;
}

.pesan-loading, 
.pesan-error {
    text-align: center;
    padding: 30px 20px;
    background-color: #fdfbf0;
    border-radius: 8px;
    margin-top: 20px;
    color: #333333;
    font-weight: 600;
    font-size: 16px;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
}

.pesan-error {
    background-color: #fde8e8;
    color: #cc0000;
}

@media (max-width: 768px) {
    .info {
        flex-direction: column;
        align-items: flex-start;
        gap: 15px;
    }

    .table-container {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
    }

    table {
        min-width: 700px;
    }

    header h1 {
        font-size: 24px;
    }

    header h2 {
        font-size: 16px;
    }
}

footer{
    text-align: center;
}
    </style>
</head>
<body>
    <header>
        <h1>Jadwal Imsakiyah</h1>
        <p class="tahun">Ramadhan 1447 H || 2026 M</p>
    </header>
    <main>
        <section class="info">
            <div class="dropdown">
                <label for="kota">Pilihan Kota:</label>
                <select id="pilihKota">
                </select>
            </div>

            <div class="tanggal">
                <span id="info-tanggal">Memuat tanggal...</span>
            </div>
        </section>

        <section id="loading-data" class="pesan-loading">
            Memuat data...
        </section>

        <section id="error-data" class="pesan-error">
            Gagal memuat data. Silakan coba lagi.
        </section>

        <section id="isi-tabel" class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Tanggal</th>
                        <th>Imsak</th>
                        <th>Subuh</th>
                        <th>Dzuhur</th>
                        <th>Ashar</th>
                        <th>Maghrib</th>
                        <th>Isya</th>
                    </tr>
                </thead>
                <tbody id="tabel-jadwal">
                </tbody>
            </table>
        </section>
    </main>

    <footer>
        <p>© 2026 Portal Ramadhan</p>
    </footer>
    
    <script>
      document.addEventListener('DOMContentLoaded', () => {

        const pilihKota = document.getElementById('pilihKota')
        const infoTanggal = document.getElementById('info-tanggal')
        const loading = document.getElementById('loading-data')
        const error = document.getElementById('error-data')
        const tabel = document.getElementById('isi-tabel')
        const jadwal = document.getElementById('tabel-jadwal')

        const tampilkanTanggalHariIni = () => {
            const waktuSekarang = new Date();
            const opsiFormat = { weekday: 'long', day: 'numeric', month: 'long', year:'numeric'};
            infoTanggal.textContent = waktuSekarang.toLocaleDateString('id-ID', opsiFormat);
        };

        const tanggalHariIni = () => {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        const fetchSemuaKota = async () => {
            try{
                const response = await fetch('https://api.myquran.com/v2/sholat/kota/semua');
                const result = await response.json();

                if(result.status && result.data){
                    pilihKota.innerHTML = '';
                    result.data.sort((a, b) => a.lokasi.localeCompare(b.lokasi));

                    result.data.forEach(kota => {
                        const  option = document.createElement('option');
                        option.value = kota.id; 
                        option.textContent = kota.lokasi; 

                    if(kota.id === "0201"){
                        option.selected = true;
                    }

                    pilihKota.appendChild(option);

                    });
                    fetchJadwal(pilihKota.value);
                }
            }catch (error) {
                console.error('Gagal memuat kota:', error);
                pilihKota.innerHTML = '<option value="">Gagal memuat daftar kota</option>';
            }
        };

        const fetchJadwal = async (cityId) => {
            if (!cityId) return;

            loading.style.display = 'block';
            error.style.display = 'none';
            tabel.style.display = 'none';
            jadwal.innerHTML = '';

            try{
                const year = new Date().getFullYear();
                const month = String(new Date().getMonth() + 1).padStart(2, '0');
                const apiUrl = `https://api.myquran.com/v2/sholat/jadwal/${cityId}/${year}/${month}`;

                const response = await fetch(apiUrl);
                if(!response.ok) throw new Error ('Network response tidak ok');

                const result = await response.json();

                if (result.status && result.data && result.data.jadwal) {
                    renderTable(result.data.jadwal);
                } else {
                     throw new Error('Format data tidak sesuai');
                }
                } catch (error) {
                    console.error('Error fetching data:', error);
                    loading.style.display = 'none';
                    error.style.display = 'block';
                }
            };

            const renderTable = (jadwalData) => {
                const todayStr = tanggalHariIni();
                
                jadwalData.forEach(hari => {
                    const tr = document.createElement('tr');

                    if (hari.date === todayStr) {
                        tr.classList.add('today-highlight');
                    }

                    tr.innerHTML = `
                        <td><strong>${hari.tanggal}</strong></td>
                        <td>${hari.imsak}</td>
                        <td>${hari.subuh}</td>
                        <td>${hari.dzuhur}</td>
                        <td>${hari.ashar}</td>
                        <td><strong>${hari.maghrib}</strong></td>
                        <td>${hari.isya}</td>
                    `;
                    jadwal.appendChild(tr);
                });

                loading.style.display = 'none';
                tabel.style.display = 'block';
            };

            pilihKota.addEventListener('change', (e) => {
                fetchJadwal(e.target.value);
            });

            tampilkanTanggalHariIni();
            fetchSemuaKota();

        });
    </script>
</body>
</html>
